<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Alstom NDT — Skaner Prób</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f4f8; --surface:#ffffff; --surface2:#f5f7fa;
  --border:#dde3ec; --accent:#0072c6; --accent2:#e05a1e;
  --mt:#e05a1e; --ut:#0072c6; --text:#1a2233; --muted:#6b7a90;
  --ok:#16a34a; --err:#dc2626;
  --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
.app{max-width:500px;margin:0 auto;padding:20px 16px 60px}

/* HEADER */
.header{display:flex;align-items:center;gap:14px;padding:20px 0 24px;border-bottom:2px solid var(--border);margin-bottom:24px}
.logo{width:46px;height:46px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:600;font-size:13px;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(0,114,198,.25)}
.header h1{font-family:var(--mono);font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--accent)}
.header p{font-size:11px;color:var(--muted);margin-top:3px;font-family:var(--mono)}

/* SECTION LABEL */
.slabel{font-family:var(--mono);font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}

/* UPLOAD */
.upload-zone{border:2px dashed var(--border);border-radius:14px;padding:36px 20px;text-align:center;cursor:pointer;background:var(--surface);position:relative;transition:all .2s}
.upload-zone:hover,.upload-zone.over{border-color:var(--accent);background:#e8f2fb}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-zone .ico{font-size:40px;display:block;margin-bottom:12px}
.upload-zone h3{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--text)}
.upload-zone p{font-size:12px;color:var(--muted)}
.preview{margin-top:14px;border-radius:12px;overflow:hidden;border:1px solid var(--border);background:#f8fafc}
.preview img{width:100%;max-height:280px;object-fit:contain;display:block}
.preview-lbl{padding:7px 12px;font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--surface2);display:flex;justify-content:space-between}

/* SCAN BTN */
.scan-btn{display:none;width:100%;margin-top:14px;padding:16px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-family:var(--mono);font-size:14px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;box-shadow:0 2px 10px rgba(0,114,198,.3)}
.scan-btn:hover{background:#005fa3;box-shadow:0 4px 16px rgba(0,114,198,.4)}
.scan-btn:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}

/* PROGRESS */
.progress{display:none;margin-top:12px;background:var(--border);border-radius:4px;height:5px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;width:0%;transition:width .3s}
.status-msg{display:none;margin-top:8px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--muted)}

/* ERROR */
.error-box{display:none;margin-top:14px;background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:12px;font-size:12px;color:#b91c1c;font-family:var(--mono)}

/* RESULTS */
#results{display:none;margin-top:28px}
.divider{height:1px;background:var(--border);margin:20px 0}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.icard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.icard .lbl{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.icard .val{font-size:14px;font-weight:600;word-break:break-all;color:var(--text)}
.pcols{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.pcol{background:var(--surface);border-radius:12px;overflow:hidden;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.phdr{padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.phdr.mt{background:#fff4ef}
.phdr.ut{background:#eef4fb}
.badge{font-family:var(--mono);font-size:12px;font-weight:600;padding:3px 9px;border-radius:5px}
.badge.mt{background:var(--mt);color:#fff}
.badge.ut{background:var(--ut);color:#fff}
.pcnt{font-family:var(--mono);font-size:11px;color:var(--muted)}
.plist{padding:10px;min-height:60px}
.pitem{font-family:var(--mono);font-size:12px;padding:5px 9px;border-radius:6px;margin-bottom:4px;border:1px solid transparent}
.pitem.mt{background:#fff0ea;border-color:#fbc9ad;color:#9c3b0e}
.pitem.ut{background:#e8f1fb;border-color:#b5cff0;color:#0a4d8f}
.pempty{font-size:11px;color:var(--muted);padding:8px;font-style:italic}
.erow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.ebtn{padding:14px 10px;border:none;border-radius:12px;cursor:pointer;font-family:var(--mono);font-size:12px;font-weight:600;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:5px}
.ebtn .ico{font-size:20px}
.ebtn.mt{background:#fff0ea;border:1.5px solid #f0a07a;color:#c04a10}
.ebtn.ut{background:#e8f1fb;border:1.5px solid #7aacde;color:#0058a0}
.ebtn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.ebtn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
.ebtn-all{width:100%;padding:14px;border:none;border-radius:12px;cursor:pointer;font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:1px;background:#f0faf4;border:1.5px solid #86efac;color:#15803d;text-transform:uppercase;transition:all .2s}
.ebtn-all:disabled{opacity:.35;cursor:not-allowed}
.ebtn-all:hover:not(:disabled){background:#dcfce7;box-shadow:0 3px 10px rgba(22,163,74,.2)}
.reset-btn{width:100%;margin-top:20px;padding:12px;background:transparent;border:1.5px solid var(--border);border-radius:10px;color:var(--muted);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .2s;letter-spacing:1px;text-transform:uppercase}
.reset-btn:hover{border-color:var(--text);color:var(--text);background:var(--surface)}
.email-section{margin-top:20px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.email-section .lbl{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.email-row{display:flex;gap:8px}
.email-input{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none}
.email-input:focus{border-color:var(--accent)}
.email-btn{padding:9px 14px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:var(--mono);font-size:12px;cursor:pointer;white-space:nowrap;transition:all .2s}
.email-btn:hover{background:#005fa3}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);background:#fff;border:1px solid #86efac;border-radius:10px;padding:10px 22px;font-family:var(--mono);font-size:12px;color:var(--ok);transition:transform .3s;z-index:999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">NDT</div>
    <div>
      <h1>Skaner Prób</h1>
      <p>Alstom · MT / UT · OCR</p>
      <p style="font-size:11px;color:#e05a1e;margin-top:4px;font-family:var(--mono);letter-spacing:1px;">Created by Borcios</p>
    </div>
  </div>

  <input type="hidden" id="apiKey" value="">

  <!-- UPLOAD -->
  <div class="slabel">01 — Wczytaj formularz</div>
  <div class="upload-zone" id="zone"
    ondrop="onDrop(event)" ondragover="event.preventDefault();this.classList.add('over')" ondragleave="this.classList.remove('over')">
    <input type="file" accept="image/*" id="fileInput" onchange="onFile(this.files[0])">
    <span class="ico">📷</span>
    <h3>Wybierz zdjęcie</h3>
    <p>JPG, PNG, HEIC — formularz Alstom</p>
  </div>

  <div id="previewWrap" style="display:none">
    <div class="preview">
      <img id="previewImg" alt="Podgląd">
    </div>
    <div class="preview-lbl">
      <span id="previewName"></span>
      <span id="previewSize"></span>
    </div>
  </div>

  <button class="scan-btn" id="scanBtn" onclick="scan()">⚡ Analizuj formularz</button>
  <div class="progress" id="progressBar"><div class="pfill" id="pfill"></div></div>
  <div class="status-msg" id="statusMsg">Wysyłanie do Claude AI…</div>
  <div class="error-box" id="errorBox"></div>

  <!-- RESULTS -->
  <div id="results">
    <div class="divider"></div>
    <div class="slabel">02 — Wyniki odczytu</div>
    <div class="info-grid">
      <div class="icard"><div class="lbl">Spawacz</div><div class="val" id="rSpawacz">—</div></div>
      <div class="icard"><div class="lbl">Projekt</div><div class="val" id="rProjekt">—</div></div>
    </div>
    <div class="pcols">
      <div class="pcol">
        <div class="phdr mt"><span class="badge mt">MT</span><span class="pcnt" id="mtCnt">0 prób</span></div>
        <div class="plist" id="mtList"><div class="pempty">brak</div></div>
      </div>
      <div class="pcol">
        <div class="phdr ut"><span class="badge ut">UT</span><span class="pcnt" id="utCnt">0 prób</span></div>
        <div class="plist" id="utList"><div class="pempty">brak</div></div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="slabel">03 — Eksportuj do Excel</div>
    <div class="erow">
      <button class="ebtn mt" id="btnMT" disabled onclick="exportXLSX('MT')"><span class="ico">🔥</span>Pobierz MT</button>
      <button class="ebtn ut" id="btnUT" disabled onclick="exportXLSX('UT')"><span class="ico">🔊</span>Pobierz UT</button>
    </div>
    <button class="ebtn-all" id="btnBoth" disabled onclick="exportXLSX('BOTH')">⬇ Pobierz oba pliki</button>

    <div class="email-section" id="emailSection" style="display:none">
      <div class="lbl">📧 Wyślij email z plikami</div>
      <div class="email-row">
        <input class="email-input" id="emailTo" type="email" placeholder="odbiorca@firma.pl">
        <button class="email-btn" onclick="sendEmail()">Wyślij ✉</button>
      </div>
    </div>
    <button class="reset-btn" onclick="reset()">↩ Skanuj kolejny formularz</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let imgB64 = null, currentResult = null;

function onDrop(e) {
  e.preventDefault();
  document.getElementById('zone').classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f) onFile(f);
}

function onFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      const MAX = 1800;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      let q = 0.85, comp;
      do { comp = canvas.toDataURL('image/jpeg', q); q -= 0.1; }
      while (comp.length * 0.75 > 4.2 * 1024 * 1024 && q > 0.2);
      imgB64 = comp.split(',')[1];
      const kb = Math.round(imgB64.length * 0.75 / 1024);
      document.getElementById('previewImg').src = comp;
      document.getElementById('previewName').textContent = file.name;
      document.getElementById('previewSize').textContent = kb + ' KB (po kompresji)';
      document.getElementById('previewWrap').style.display = 'block';
      document.getElementById('scanBtn').style.display = 'block';
      document.getElementById('errorBox').style.display = 'none';
      document.getElementById('results').style.display = 'none';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

async function scan() {
  if (!imgB64) { showError('Najpierw wczytaj zdjęcie!'); return; }
  const btn = document.getElementById('scanBtn');
  btn.disabled = true; btn.textContent = '⏳ Analizuję…';
  document.getElementById('progressBar').style.display = 'block';
  document.getElementById('statusMsg').style.display = 'block';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  let prog = 10;
  const iv = setInterval(() => { prog = Math.min(prog + 6, 85); document.getElementById('pfill').style.width = prog + '%'; }, 400);
  try {
    const resp = await fetch('/api/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ api_key: '', image_base64: imgB64 })
    });
    clearInterval(iv);
    document.getElementById('pfill').style.width = '100%';
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    currentResult = data.result;
    showResults(data.result);
  } catch(e) {
    clearInterval(iv);
    showError(e.message);
  } finally {
    btn.disabled = false; btn.textContent = '⚡ Analizuj ponownie';
    document.getElementById('progressBar').style.display = 'none';
    document.getElementById('statusMsg').style.display = 'none';
  }
}

function showResults(d) {
  document.getElementById('rSpawacz').textContent = d.spawacz || '?';
  document.getElementById('rProjekt').textContent = d.projekt || '?';
  const mt = d.mt_proby || [], ut = d.ut_proby || [];
  const fill = (listId, cntId, items, cls) => {
    const el = document.getElementById(listId);
    el.innerHTML = items.length
      ? items.map(p => `<div class="pitem ${cls}">${p}</div>`).join('')
      : `<div class="pempty">brak prób ${cls.toUpperCase()}</div>`;
    document.getElementById(cntId).textContent = items.length + ' prób';
  };
  fill('mtList', 'mtCnt', mt, 'mt');
  fill('utList', 'utCnt', ut, 'ut');
  document.getElementById('btnMT').disabled = mt.length === 0;
  document.getElementById('btnUT').disabled = ut.length === 0;
  document.getElementById('btnBoth').disabled = mt.length === 0 && ut.length === 0;
  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollIntoView({behavior:'smooth'});
  document.getElementById('emailSection').style.display = 'block';
}

async function exportXLSX(type) {
  if (!currentResult) return;
  const types = type === 'BOTH' ? ['MT','UT'] : [type];
  for (const t of types) {
    const proby = t === 'MT' ? (currentResult.mt_proby||[]) : (currentResult.ut_proby||[]);
    if (!proby.length) continue;
    await downloadFromServer(t, proby, currentResult.spawacz, currentResult.projekt);
  }
}

const downloadedFiles = {};

async function downloadFromServer(type, proby, spawacz, projekt) {
  try {
    const resp = await fetch('/api/export', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({type, proby, spawacz, projekt})
    });
    if (!resp.ok) {
      const err = await resp.json();
      showError(err.error || 'Błąd eksportu');
      return null;
    }
    const blob = await resp.blob();
    const spawaczSafe = (spawacz || '').replace(/ /g, '_').toUpperCase();
    const probyStr = proby.join('_');
    const fname = `${type}_${probyStr}_${spawaczSafe}.xlsx`;
    downloadedFiles[type] = { blob, fname };
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fname;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast(`✓ Pobrano ${fname}`);
    return { blob, fname };
  } catch(e) {
    showError('Błąd eksportu: ' + e.message);
    return null;
  }
}

async function sendEmail() {
  const to = document.getElementById('emailTo').value.trim();
  if (!to) { showError('Wpisz adres email odbiorcy!'); return; }
  if (!currentResult) return;
  const mt = currentResult.mt_proby || [];
  const ut = currentResult.ut_proby || [];
  const spawacz = currentResult.spawacz || '';
  const projekt = currentResult.projekt || '';
  const subject = `NDT Wyniki — ${projekt} — ${spawacz}`;
  let bodyText = `Dzień dobry,\n\nW załączeniu przesyłam wyniki badań nieniszczących.\n\n`;
  bodyText += `Spawacz: ${spawacz}\nProjekt: ${projekt}\n\n`;
  if (mt.length) bodyText += `Próby MT (${mt.length}): ${mt.join(', ')}\n`;
  if (ut.length) bodyText += `Próby UT (${ut.length}): ${ut.join(', ')}\n`;
  bodyText += `\nPozdrawiam`;
  const btn = document.querySelector('.email-btn');
  btn.textContent = '⏳ Generuję...'; btn.disabled = true;
  const filesToAttach = [];
  for (const [type, proby] of [['MT', mt], ['UT', ut]]) {
    if (!proby.length) continue;
    if (!downloadedFiles[type]) await downloadFromServer(type, proby, spawacz, projekt);
    if (downloadedFiles[type]) {
      const { blob, fname } = downloadedFiles[type];
      filesToAttach.push(new File([blob], fname, {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}));
    }
  }
  btn.textContent = 'Wyślij ✉'; btn.disabled = false;
  if (filesToAttach.length && navigator.canShare && navigator.canShare({ files: filesToAttach })) {
    try { await navigator.share({ title: subject, text: bodyText, files: filesToAttach }); return; }
    catch(e) { if (e.name === 'AbortError') return; }
  }
  window.location.href = `mailto:${to}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(bodyText)}`;
}

function showError(msg) {
  const b = document.getElementById('errorBox');
  b.textContent = '⚠ ' + msg; b.style.display = 'block';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function reset() {
  imgB64 = null; currentResult = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('previewWrap').style.display = 'none';
  document.getElementById('scanBtn').style.display = 'none';
  document.getElementById('scanBtn').textContent = '⚡ Analizuj formularz';
  document.getElementById('results').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('emailSection').style.display = 'none';
  Object.keys(downloadedFiles).forEach(k => delete downloadedFiles[k]);
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
